name: MacroRecorder
options:
  bundleIdPrefix: com.macro
  deploymentTarget:
    macOS: "12.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"

targets:
  MacroRecorder:
    type: application
    platform: macOS
    sources:
      - path: .
      - path: Info.plist
      - path: MacroRecorder.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macro.MacroRecorder
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: MacroRecorder.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    entitlements:
      path: MacroRecorder.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.mouse: true
        com.apple.security.personal-information.accessibility: true
